name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Test
        run: mvn -B test

      - name: Package
        run: |
          mvn -B clean package -DskipTests
          cp target/tbr-app-*.jar app.jar

      - name: SCP JAR to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   app.jar
          target:   /opt/tbr/incoming/

      - name: Swap & restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            # Absolute paths throughout — sudoers matches on the literal
            # command string, so relative paths after `cd` would not match.
            sudo chown tbr:tbr /opt/tbr/incoming/app.jar
            # Use if/fi (not `[ -f X ] && cmd`) — under `set -e` a false test
            # short-circuits to exit 1 and kills the whole script. That
            # matters on the first-ever deploy (no app.jar yet) and after a
            # partial-failure run that left app.jar renamed to .prev.
            if [ -f /opt/tbr/app.jar ]; then
              sudo -u tbr mv /opt/tbr/app.jar /opt/tbr/app.jar.prev
            fi
            sudo -u tbr mv /opt/tbr/incoming/app.jar /opt/tbr/app.jar

            # Regenerate CDS archive against the new JAR (~10s training run).
            # Loads beans, hits onRefresh, exits — nothing is served during this.
            # Use the same JVM that the systemd unit runs (Temurin 25). CDS
            # archives are not portable across JVM versions — if this used
            # the system `java` (OpenJDK 21 on this VPS), the runtime Java
            # 25 would reject the archive and silently fall back to no-CDS.
            sudo -u tbr bash -c 'set -a; source /opt/tbr/.env; set +a; \
              /usr/lib/jvm/temurin-25-jdk-amd64/bin/java \
                -XX:ArchiveClassesAtExit=/opt/tbr/app.jsa \
                -Dspring.context.exit=onRefresh \
                -jar /opt/tbr/app.jar' || true

            sudo systemctl restart tbr
            sleep 5
            sudo systemctl is-active --quiet tbr || (sudo journalctl -u tbr -n 50 --no-pager; exit 1)
