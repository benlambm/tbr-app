spring.application.name=tbr-app

# --- Local dev: H2 in-memory database ---
# Resets on every restart. Sample data loads from data.sql.
spring.datasource.url=jdbc:h2:mem:tbrdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# Sample data on startup
spring.sql.init.mode=always

# H2 console at http://localhost:8080/h2-console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf: disable cache during dev so DevTools sees template changes immediately
spring.thymeleaf.cache=false

# Server port (Render injects PORT at runtime)
server.port=${PORT:8080}
