spring.application.name=tbr-app

# --- Local dev: H2 in-memory database ---
# Resets on every restart. Sample data loads from data.sql.
spring.datasource.url=jdbc:h2:mem:tbrdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
# ddl-auto=update tells Hibernate: on startup, inspect the @Entity classes
# and CREATE/ALTER tables to match. No schema.sql needed.
# defer-datasource-initialization=true makes data.sql run AFTER Hibernate
# creates the tables (otherwise it would try to INSERT into a non-existent
# table). Flip show-sql=true to watch the generated SQL in the console.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false

# Sample data on startup
spring.sql.init.mode=always

# H2 console at http://localhost:8080/h2-console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf: disable cache during dev so DevTools sees template changes immediately
spring.thymeleaf.cache=false

# Server port (Render injects PORT at runtime)
server.port=${PORT:8080}

# Error page: surface useful debugging info to templates/error.html.
# Spring Boot 4 moved these from `server.error.*` to `spring.web.error.*`.
# - include-message=always:        always render the exception message
# - include-exception=true:        include the exception class name
# - include-binding-errors=always: include @Valid field errors
# - include-stacktrace=on_param:   stack trace only if ?trace=true is on the URL
#   (keeps stack traces out of the page by default but makes them one click away)
spring.web.error.include-message=always
spring.web.error.include-exception=true
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param
