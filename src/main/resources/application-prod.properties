# --- Production profile: PostgreSQL via Neon (or any external Postgres) ---
# Activated by setting SPRING_PROFILES_ACTIVE=prod on Render.
# JDBC_DATABASE_URL must be a JDBC-formatted connection string, e.g.:
#   jdbc:postgresql://ep-xyz.neon.tech/dbname?sslmode=require&user=USER&password=PASS

spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate for Postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Do NOT re-seed data.sql on every restart in prod (would duplicate rows)
spring.sql.init.mode=never

# H2 console disabled in prod
spring.h2.console.enabled=false

# Thymeleaf: keep template caching ON in prod for speed
spring.thymeleaf.cache=true

# Render injects PORT
server.port=${PORT:8080}
