# --- Production profile: PostgreSQL via Neon (or any external Postgres) ---
# Activated by setting SPRING_PROFILES_ACTIVE=prod on Render.
# JDBC_DATABASE_URL must be a JDBC-formatted connection string, e.g.:
#   jdbc:postgresql://ep-xyz.neon.tech/dbname?sslmode=require&user=USER&password=PASS

spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate for Postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Do NOT re-seed data.sql on every restart in prod (would duplicate rows)
spring.sql.init.mode=never

# H2 console disabled in prod
spring.h2.console.enabled=false

# Thymeleaf: keep template caching ON in prod for speed
spring.thymeleaf.cache=true

# Render injects PORT
server.port=${PORT:8080}

# Error page: surface useful debugging info to templates/error.html.
# See application.properties for what each flag does. Stack trace stays
# behind ?trace=true so we don't leak internals on a public deployment.
spring.web.error.include-message=always
spring.web.error.include-exception=true
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=on_param

# Content-versioned static resources for cache-busting in prod.
# Spring Boot rewrites @{/css/common.css} → /css/common-{hash}.css. When the
# file content changes, the hash changes, browsers see a new URL and refetch.
# Without this, Spring serves CSS with only Last-Modified (no Cache-Control),
# so browsers heuristically cache and miss CSS changes for hours/days.
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
